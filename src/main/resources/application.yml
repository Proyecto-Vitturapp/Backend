server:
  port: 8082

spring:
  datasource:
    username: ${USER}
    password: ${PASS}
    url: ${URL}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true